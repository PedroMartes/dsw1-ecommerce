<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/cadastro.css">
    <title>Zetta - Cadastro</title>
</head>

<body>
    <div class="container cadastro-page">
        <header class="header">
            <div class="logo">ZETTA</div>
        </header>

        <main class="content-cadastro">
            <div class="cadastro-card">
                <form id="cadForm">
                    <h2>Crie sua conta</h2>
                    <p class="subtitle">Cadastre-se para aproveitar nossas ofertas</p>

                    <div class="input-group">
                        <label for="nome">Nome Completo</label>
                        <input type="text" id="nome" placeholder="Seu Nome" required>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Seu@email.com" required>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Crie uma senha forte" required>
                    </div>

                    <button type="submit" class="btn-cadastro">CRIAR CONTA</button>
                    
                    <p class="footer-link">
                        Já tem conta? <a href="login.html">Fazer Login</a>
                    </p>
                </form>
            </div>
        </main>

        <footer class="footer">Zetta Eletrônicos &copy; 2026</footer>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('cadForm').onsubmit = async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=cadastro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                if (res.ok) {
                    alert("✅ Cadastro realizado com sucesso!");
                    window.location.href = 'login.html';
                } else {
                    alert("❌ Erro ao realizar cadastro. Tente outro e-mail.");
                }
            } catch (error) {
                alert("❌ Erro de conexão com o servidor.");
            }
        };
    </script>
</body>

</html>
