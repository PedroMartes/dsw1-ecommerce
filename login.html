<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <title>Zetta - Login</title>
</head>

<body>
    <div class="container login-page">
        <header class="header">
            <div class="logo">ZETTA</div>
        </header>

        <main class="content-login">
            <div class="login-card">
                <form id="loginForm">
                    <h2>Login</h2>
                    <p class="subtitle">Acesse sua conta para continuar</p>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" placeholder="Seu@email.com" required>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-login">ENTRAR</button>
                    
                    <p class="footer-link">
                        Não tem conta? <a href="cadastro.html">Cadastre-se</a>
                    </p>
                </form>
            </div>
        </main>

        <footer class="footer">Zetta Eletrônicos &copy; 2026</footer>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const res = await fetch(`${API_BASE}/auth.php?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('zetta_user', JSON.stringify(data));
                    window.location.href = data.nivel === 'admin' ? 'clientes.html' : 'index.html';
                } else { 
                    alert("E-mail ou senha incorretos!"); 
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor.");
            }
        };
    </script>
</body>

</html>
