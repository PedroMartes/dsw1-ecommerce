<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/global.css">
    <title>Zetta Store - Eletrônicos</title>
</head>
<body>
    <script src="js/auth_check.js"></script>

    <div class="container">
        <header class="header">
            <div class="logo">ZETTA</div>
            <div class="user-info" id="auth-header">
                </div>
        </header>

        <aside class="sidebar">
            <h3>Menu</h3>
            <ul>
                <li><a href="index.html" class="active">Produtos</a></li>
                <li><a href="carrinho.html">Meu Carrinho</a></li>
                <li><a href="pedidos.html">Meus Pedidos</a></li>
            </ul>
        </aside>

        <main class="content">
            <h2>Nossos Produtos</h2>
            <div id="lista-produtos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:25px; margin-top:20px;">
                </div>
        </main>

        <footer class="footer">Zetta Store &copy; 2026</footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    <script>
        const authHeader = document.getElementById('auth-header');
        if (user) {
            authHeader.innerHTML = `<span>Olá, ${user.nome}</span> <button onclick="logout()" class="btn-logout">Sair</button>`;
        } else {
            authHeader.innerHTML = `<button onclick="location.href='login.html'" style="background:#3399ff; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold;">Entrar / Cadastro</button>`;
        }

        fetchData('produtos.php').then(data => {
            const lista = document.getElementById('lista-produtos');
            
            if (!data || data.length === 0) {
                lista.innerHTML = "<p style='color:#666;'>Nenhum produto disponível no momento.</p>";
                return;
            }

            data.forEach(p => {
                // Garante que a imagem tenha o prefixo base64 se não tiver
                const imgSource = p.imagem.startsWith('data:image') ? p.imagem : `data:image/jpeg;base64,${p.imagem}`;
                
                // Objeto para o carrinho (sem a imagem base64 para não sobrecarregar o localStorage)
                const prodParaCarrinho = { id: p.id, nome: p.nome, preco: p.preco };
                const prodData = btoa(unescape(encodeURIComponent(JSON.stringify(prodParaCarrinho))));

                lista.innerHTML += `
                <div class="card" style="text-align:center; transition: 0.3s; border: 1px solid #333; padding: 20px; background: #1a1a1a; border-radius: 8px;">
                    <a href="produto-detalhes.html?id=${p.id}" style="text-decoration:none; display: block;">
                        <div style="width:100%; height:160px; background:#000; border-radius:4px; display:flex; align-items:center; justify-content:center; overflow:hidden; margin-bottom:15px;">
                            <img src="${imgSource}" style="width:100%; height:100%; object-fit:contain; transition: transform 0.3s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
                        </div>
                        <h4 style="color:white; margin-bottom:10px; height: 40px; overflow: hidden;">${p.nome}</h4>
                    </a>
                    <p style="color:#3399ff; font-weight:bold; font-size:18px; margin-bottom:15px;">R$ ${parseFloat(p.preco).toFixed(2)}</p>
                    <button onclick="validarCompra('${prodData}', '${imgSource}')" 
                        style="width:100%; cursor:pointer; background:#3399ff; color:white; border:none; padding:12px; font-weight:bold; border-radius:4px; transition: 0.2s;" 
                        onmouseover="this.style.background='#2673c2'" onmouseout="this.style.background='#3399ff'">
                        Comprar
                    </button>
                </div>`;
            });
        });

        function validarCompra(encodedData, imgSrc) {
            if (!user) {
                alert("Você precisa estar logado para comprar!");
                window.location.href = 'login.html';
                return;
            }
            
            const produto = JSON.parse(decodeURIComponent(escape(atob(encodedData))));
            produto.imagem = imgSrc; // Reanexa a imagem apenas no momento de enviar ao carrinho
            
            // Aqui você chama sua função de cart.js
            if (typeof addToCart === 'function') {
                addToCart(produto);
            } else if (typeof adicionarAoCarrinho === 'function') {
                adicionarAoCarrinho(produto);
            }
        }
    </script>
</body>
</html>
